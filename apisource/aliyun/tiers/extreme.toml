# tiers/extreme.toml
# 档位: extreme
# 说明: 把每个任务槽的 model_list 映射到 [[models]] 里的 name。
# 你可以手动编辑这份文件调整选择。

[tier.replyer]
model_list = [
    "qwen-max",
    "qwen-max-0428",
    "qwen-max-0919",
    "qwen-max-latest",
    "qwen3-max",
    "qwen-plus",
    "qwen-plus-0112",
    "qwen-plus-1220",
]
max_tokens = 4096
temperature = 1.0
slow_threshold = 120
selection_strategy = "random"

[tier.planner]
model_list = [
    "qwen-max",
    "qwen-max-0428",
    "qwen-max-0919",
    "qwen-plus",
    "qwen-plus-0112",
]
max_tokens = 8000
temperature = 0.7
slow_threshold = 12
selection_strategy = "random"

[tier.utils]
model_list = [
    "qwen-plus",
    "qwen-plus-0112",
    "qwen-plus-1220",
    "qwen-plus-latest",
]
max_tokens = 4096
temperature = 0.5
slow_threshold = 15
selection_strategy = "random"

[tier.vlm]
model_list = [
    "qwen-vl-max",
    "qwen-vl-max-1119",
    "qwen-vl-max-1230",
]
max_tokens = 512
temperature = 0.3
slow_threshold = 15
selection_strategy = "random"
